<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lab 9 - Forms</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="page">
            <section class="form-card">
                <div class="tabs">
                    <button class="tab active" id="signupTab">Signup</button>
                    <button class="tab" id="loginTab">Login</button>
                </div>

                <!-- SIGNUP FORM -->
                <form id="signupForm" class="form active" novalidate>
                    <h1>Create an account</h1>

                    <div class="form-row">
                        <div class="field">
                            <label for="firstName">First Name</label>
                            <input
                                type="text"
                                id="firstName"
                                placeholder="Enter first name"
                            />
                            <small></small>
                        </div>

                        <div class="field">
                            <label for="lastName">Last Name</label>
                            <input
                                type="text"
                                id="lastName"
                                placeholder="Enter last name"
                            />
                            <small></small>
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="example@mail.com"
                        />
                        <small></small>
                    </div>

                    <div class="field password-field">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                placeholder="Enter password"
                            />
                            <button
                                type="button"
                                class="eye-btn"
                                data-target="password"
                            >
                                👁
                            </button>
                        </div>
                        <small></small>
                    </div>

                    <div class="field password-field">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Repeat password"
                            />
                            <button
                                type="button"
                                class="eye-btn"
                                data-target="confirmPassword"
                            >
                                👁
                            </button>
                        </div>
                        <small></small>
                    </div>

                    <div class="field">
                        <label for="phone">Phone</label>
                        <input
                            type="tel"
                            id="phone"
                            placeholder="+380XXXXXXXXX"
                        />
                        <small></small>
                    </div>

                    <div class="field">
                        <label for="birthDate">Date Birth</label>
                        <input type="date" id="birthDate" />
                        <small></small>
                    </div>

                    <div class="field">
                        <label>Sex</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="sex" value="male" />
                                Male
                            </label>
                            <label>
                                <input type="radio" name="sex" value="female" />
                                Female
                            </label>
                        </div>
                        <small id="sexError"></small>
                    </div>

                    <div class="form-row">
                        <div class="field">
                            <label for="country">Country</label>
                            <select id="country">
                                <option value="">Choose country</option>
                                <option value="Ukraine">Ukraine</option>
                                <option value="Poland">Poland</option>
                                <option value="Germany">Germany</option>
                            </select>
                            <small></small>
                        </div>

                        <div class="field">
                            <label for="city">City</label>
                            <select id="city" disabled>
                                <option value="">Choose city</option>
                            </select>
                            <small></small>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Signup</button>

                    <p class="success-message" id="signupSuccess"></p>
                </form>

                <!-- LOGIN FORM -->
                <form id="loginForm" class="form" novalidate>
                    <h1>Login here</h1>

                    <div class="field">
                        <label for="username">Email</label>
                        <input
                            type="email"
                            id="username"
                            placeholder="Enter email"
                        />
                        <small></small>
                    </div>

                    <div class="field password-field">
                        <label for="loginPassword">Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="loginPassword"
                                placeholder="Enter password"
                            />
                            <button
                                type="button"
                                class="eye-btn"
                                data-target="loginPassword"
                            >
                                👁
                            </button>
                        </div>
                        <small></small>
                    </div>

                    <label class="remember">
                        <input type="checkbox" id="rememberMe" />
                        Remember Me
                    </label>

                    <button type="submit" class="submit-btn">Login</button>

                    <p class="success-message" id="loginSuccess"></p>
                </form>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
