<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Лабораторна робота №6</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="header">
            <div class="header__left">
                <h1>Список товарів</h1>
                <p>Маніпуляція вебсторінкою за допомогою JavaScript</p>
            </div>

            <aside class="total-box">
                <span>Загальна вартість:</span>
                <strong id="totalPrice">0.00 ₴</strong>
            </aside>
        </header>

        <main class="container">
            <section class="panel">
                <h2>Фільтрація</h2>
                <div class="buttons-row" id="filterButtons"></div>
            </section>

            <section class="panel">
                <h2>Сортування</h2>
                <div class="buttons-row" id="sortButtons">
                    <button
                        type="button"
                        class="btn btn--secondary"
                        data-sort="price"
                    >
                        Ціна: від меншої до більшої
                    </button>
                    <button
                        type="button"
                        class="btn btn--secondary"
                        data-sort="createdAt"
                    >
                        Дата створення: від новіших до старіших
                    </button>
                    <button
                        type="button"
                        class="btn btn--secondary"
                        data-sort="updatedAt"
                    >
                        Дата оновлення: від новіших до старіших
                    </button>
                    <button
                        type="button"
                        class="btn btn--reset"
                        id="resetSortBtn"
                    >
                        Скинути сортування
                    </button>
                </div>
            </section>

            <section class="products-section">
                <p id="emptyMessage" class="empty-message hidden">
                    Наразі список товарів пустий. Додайте новий товар.
                </p>

                <div id="productsList" class="products-grid"></div>
            </section>

            <section class="actions">
                <button
                    type="button"
                    class="btn btn--primary"
                    id="openCreateModalBtn"
                >
                    Додати новий товар
                </button>
            </section>
        </main>

        <div class="modal-backdrop hidden" id="productModalBackdrop">
            <div
                class="modal"
                role="dialog"
                aria-modal="true"
                aria-labelledby="modalTitle"
            >
                <div class="modal__header">
                    <h2 id="modalTitle">Додати товар</h2>
                    <button
                        type="button"
                        class="modal__close"
                        id="closeModalBtn"
                        aria-label="Закрити"
                    >
                        ✕
                    </button>
                </div>

                <form id="productForm" class="modal__form" novalidate>
                    <input type="hidden" id="productId" />

                    <div class="form-group">
                        <label for="name">Назва товару</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            required
                            minlength="2"
                            maxlength="60"
                            placeholder="Наприклад: Ноутбук Lenovo"
                        />
                    </div>

                    <div class="form-group">
                        <label for="price">Ціна товару</label>
                        <input
                            type="number"
                            id="price"
                            name="price"
                            required
                            min="1"
                            step="0.01"
                            placeholder="Наприклад: 25000"
                        />
                    </div>

                    <div class="form-group">
                        <label for="category">Категорія</label>
                        <select id="category" name="category" required>
                            <option value="">Оберіть категорію</option>
                            <option value="Електроніка">Електроніка</option>
                            <option value="Одяг">Одяг</option>
                            <option value="Книги">Книги</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="image">Шлях до зображення</label>
                        <input
                            type="text"
                            id="image"
                            name="image"
                            required
                            minlength="3"
                            placeholder="Наприклад: img/phone.jpg"
                        />
                        <small
                            >Вкажи шлях до локального зображення або URL.</small
                        >
                    </div>

                    <div class="modal__actions">
                        <button
                            type="submit"
                            class="btn btn--primary"
                            id="submitBtn"
                        >
                            Зберегти
                        </button>
                        <button
                            type="button"
                            class="btn btn--secondary"
                            id="cancelBtn"
                        >
                            Скасувати
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>

        <script src="script.js"></script>
    </body>
</html>
