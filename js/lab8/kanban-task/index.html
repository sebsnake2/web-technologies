<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kanban Board</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="page">
            <h1>Kanban Board</h1>

            <section class="board">
                <div class="column">
                    <div class="column-header todo-header">To do</div>
                    <div class="task-list" data-column="todo">
                        <div class="task" draggable="true">Item #9</div>
                        <div class="task" draggable="true">Item #3</div>
                        <div class="task" draggable="true">Item #5</div>
                        <div class="task" draggable="true">Item #4</div>
                    </div>
                </div>

                <div class="column">
                    <div class="column-header working-header">Working</div>
                    <div class="task-list" data-column="working">
                        <div class="task" draggable="true">Item #6</div>
                        <div class="task" draggable="true">Item #8</div>
                        <div class="task" draggable="true">Item #7</div>
                    </div>
                </div>

                <div class="column">
                    <div class="column-header done-header">Done</div>
                    <div class="task-list" data-column="done">
                        <div class="task" draggable="true">Item #11</div>
                        <div class="task" draggable="true">Item #2</div>
                        <div class="task" draggable="true">Item #13</div>
                        <div class="task" draggable="true">Item #14</div>
                    </div>
                </div>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
